name: CI Quality Pipeline

on:
  push:
    branches:
      - pipeline-test
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-test-and-analyze:
    name: Build, test and analyze
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: 12345
          MARIADB_DATABASE: proyecto3_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -uroot -p12345"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Cache Sonar packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Dar permisos a gradlew
        run: chmod +x gradlew

      - name: Ejecutar unit tests
        run: ./gradlew clean unitTest

      - name: Ejecutar api tests
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:mariadb://localhost:3306/proyecto3_test
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: 12345
        run: ./gradlew apiTest

      - name: Generar reporte JaCoCo
        run: ./gradlew jacocoTestReport

      - name: Ejecutar analisis SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar