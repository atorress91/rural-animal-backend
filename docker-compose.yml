
services:
  mariadb:
    image: mariadb:11.2
    container_name: rural-animal-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: 12345
      MARIADB_DATABASE: proyecto3
      MARIADB_USER: rural_user
      MARIADB_PASSWORD: 123456
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - rural-animal-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.2-alpine
    container_name: rural-animal-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rural-animal-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mariadb_data:
    driver: local
  redis_data:
    driver: local

networks:
  rural-animal-network:
    driver: bridge
