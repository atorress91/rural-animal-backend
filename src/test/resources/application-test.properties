# ============================================================
# Configuracion de pruebas funcionales de API - Fase 2
# Usa MariaDB y Redis reales via Docker (docker-compose up -d)
# ============================================================

# Base de datos MariaDB (Docker)
spring.datasource.url=jdbc:mariadb://localhost:3306/proyecto3_test
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=12345
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Redis (Docker)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JWT (misma clave que produccion para que JwtService funcione sin cambios)
security.jwt.secret-key=3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b
security.jwt.expiration-time=3600000

# OAuth2 - valores dummy para que Spring Security pueda construir sus beans
spring.security.oauth2.client.registration.google.client-id=test-google-client-id
spring.security.oauth2.client.registration.google.client-secret=test-google-client-secret
spring.security.oauth2.client.registration.google.scope=email,profile,https://www.googleapis.com/auth/calendar
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.google.client-authentication-method=client_secret_basic
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Email - deshabilitado (se usa @MockBean en tests que disparan emails)
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test@test.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Gemini / APIs externas - claves dummy para que Spring arranque
gemini.api-key=test-key
gemini.model=gemini-2.5-flash-lite

# PayPal - modo sandbox dummy para que Spring arranque
paypal.client.id=test
paypal.client.secret=test
paypal.mode=sandbox

# Exchange rate API - dummy
exchange.rate.api.key=test
exchange.rate.api.url=https://localhost/test

# Google Calendar - dummy
google.calendar-id=test@group.calendar.google.com

# Frontend URL
frontend.url=http://localhost:4200

# Cloudinary - dummy
spring.application.name=Rural-Animal-Test

# Logging minimo para tests
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
